<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Bologna | RP</title>
    <style>
        body {
            background: #0a0f1a;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        .logout-btn {
            background: #ff5555;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="dashboard">
        <h1>Caricamento...</h1>
    </div>

    <script>
        // Recupera la sessione salvata
        const session = JSON.parse(localStorage.getItem('session') || '{}');
        
        if (!session.nome_rp) {
            // Se non loggato, torna alla home
            window.location.href = '/';
        } else {
            // Mostra dashboard
            document.getElementById('dashboard').innerHTML = `
                <h1>👋 Benvenuto, ${session.nome_rp}!</h1>
                <p>Discord: ${session.discord_nome}</p>
                <p>💰 Saldo: ${session.saldo}€</p>
                <button class="logout-btn" onclick="logout()">🚪 Logout</button>
            `;
        }
        
        function logout() {
            localStorage.removeItem('session');
            window.location.href = '/';
        }
    </script>
</body>
</html>
