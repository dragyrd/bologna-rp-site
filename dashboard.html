<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bologna RP - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f1a;
            color: #fff;
        }

        .navbar {
            background: #1a1a2e;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a3e;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2a2a3e;
        }

        .card h2 {
            margin-bottom: 15px;
            color: #5865F2;
        }

        .annuncio {
            background: #0f0f1a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid #5865F2;
        }

        .annuncio h3 {
            margin-bottom: 5px;
        }

        .ticket-item {
            background: #0f0f1a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .ticket-item:hover {
            background: #2a2a3e;
        }

        .ticket-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .status-aperto { background: #27ae60; }
        .status-in_carico { background: #f39c12; }
        .status-chiuso { background: #7f8c8d; }

        .create-ticket {
            margin-top: 20px;
            padding: 15px;
            background: #1a1a2e;
            border-radius: 12px;
        }

        select, textarea, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #0f0f1a;
            border: 1px solid #2a2a3e;
            color: white;
            border-radius: 8px;
        }

        button {
            background: #5865F2;
            cursor: pointer;
        }

        button:hover {
            background: #4752c4;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">⚜️ BOLOGNA | RP ⚜️</div>
        <div class="user-info" id="userInfo">
            <span id="userName"></span>
            <img id="userAvatar" class="user-avatar" alt="Avatar">
            <button class="logout-btn" onclick="logout()">Esci</button>
        </div>
    </div>

    <div class="container">
        <div class="grid">
            <!-- ANNUNCI -->
            <div class="card">
                <h2>📢 ANNUNCI</h2>
                <div id="annunciList"></div>
            </div>

            <!-- TICKET -->
            <div class="card">
                <h2>🎫 I MIEI TICKET</h2>
                <div id="ticketsList"></div>
            </div>
        </div>

        <!-- CREA NUOVO TICKET -->
        <div class="create-ticket">
            <h3>➕ NUOVO TICKET</h3>
            <select id="ticketCategory">
                <option value="generale">Generale - Amministrazione WEB</option>
                <option value="concessionario">Concessionario</option>
                <option value="agenzia">Agenzia Immobiliare</option>
            </select>
            <textarea id="ticketMessage" rows="3" placeholder="Descrivi il tuo problema..."></textarea>
            <button onclick="createTicket()">CREA TICKET</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let userRoles = [];

        // Ottieni token dall'URL o localStorage
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const token = params.get('access_token');
        if (token) {
            localStorage.setItem('discord_token', token);
            window.location.hash = '';
        }

        const discordToken = localStorage.getItem('discord_token');

        // Funzione per ottenere info utente da Discord
        async function getUserInfo() {
            const response = await fetch('https://discord.com/api/users/@me', {
                headers: { Authorization: `Bearer ${discordToken}` }
            });
            return response.json();
        }

        // Funzione per ottenere i ruoli dell'utente (da Supabase o localmente)
        async function getUserRoles(userId) {
            // Per ora restituisci ruoli di esempio
            // Qui poi collegherai Supabase
            return ['Amministrazione WEB']; // Esempio
        }

        // Carica annunci (filtrati per ruolo)
        async function loadAnnunci() {
            // Per ora annunci di esempio
            const annunci = [
                { titolo: 'Benvenuto su Bologna RP!', contenuto: 'Buon divertimento!', ruolo_permesso: 'tutti' },
                { titolo: 'Riunione staff stasera', contenuto: 'Ore 21:00', ruolo_permesso: 'Amministrazione WEB' }
            ];

            const filtered = annunci.filter(a => a.ruolo_permesso === 'tutti' || userRoles.includes(a.ruolo_permesso));
            
            const container = document.getElementById('annunciList');
            container.innerHTML = filtered.map(a => `
                <div class="annuncio">
                    <h3>${a.titolo}</h3>
                    <p>${a.contenuto}</p>
                </div>
            `).join('');
        }

        // Carica lista ticket
        async function loadTickets() {
            const response = await fetch('/api/tickets/list', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_discord_id: currentUser.id })
            });
            const tickets = await response.json();
            
            const container = document.getElementById('ticketsList');
            if (!tickets.length) {
                container.innerHTML = '<p>Nessun ticket aperto</p>';
                return;
            }

            container.innerHTML = tickets.map(t => `
                <div class="ticket-item" onclick="openTicket('${t.ticket_id}')">
                    <div>
                        <strong>#${t.ticket_id}</strong><br>
                        <small>Categoria: ${t.categoria}</small>
                    </div>
                    <span class="ticket-status status-${t.status}">${t.status}</span>
                </div>
            `).join('');
        }

        // Crea nuovo ticket
        async function createTicket() {
            const categoria = document.getElementById('ticketCategory').value;
            const messaggio = document.getElementById('ticketMessage').value;
            
            if (!messaggio.trim()) {
                alert('Scrivi un messaggio!');
                return;
            }

            const response = await fetch('/api/tickets/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_discord_id: currentUser.id,
                    user_discord_name: currentUser.username,
                    categoria: categoria,
                    messaggio: messaggio
                })
            });

            const data = await response.json();
            if (data.success) {
                alert('Ticket creato! ID: ' + data.ticket_id);
                document.getElementById('ticketMessage').value = '';
                loadTickets();
            } else {
                alert('Errore: ' + data.error);
            }
        }

        function openTicket(ticketId) {
            window.location.href = `/ticket.html?id=${ticketId}`;
        }

        function logout() {
            localStorage.removeItem('discord_token');
            window.location.href = '/';
        }

        // Inizializzazione
        async function init() {
            if (!discordToken) {
                window.location.href = '/';
                return;
            }

            currentUser = await getUserInfo();
            userRoles = await getUserRoles(currentUser.id);
            
            document.getElementById('userName').textContent = currentUser.username;
            document.getElementById('userAvatar').src = `https://cdn.discordapp.com/avatars/${currentUser.id}/${currentUser.avatar}.png`;
            
            await loadAnnunci();
            await loadTickets();
        }

        init();
    </script>
</body>
</html>
