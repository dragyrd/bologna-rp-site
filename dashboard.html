<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Bologna | RP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(10, 15, 26, 0.85), rgba(10, 15, 26, 0.9)), url('https://i.imgur.com/uI336Xj.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #eef2ff;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background: rgba(26, 31, 46, 0.9);
            border-radius: 20px;
            padding: 15px 25px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid #00aaff;
        }
        .saldo {
            background: rgba(0,170,255,0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            margin-right: 15px;
        }
        .logout-btn {
            background: #ff5555;
            color: white;
            padding: 6px 18px;
            border-radius: 50px;
            cursor: pointer;
            border: none;
        }
        .categories-bar {
            background: rgba(26, 31, 46, 0.9);
            border-radius: 50px;
            padding: 8px 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .category-btn {
            background: transparent;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .category-btn:hover, .category-btn.active {
            background: #00aaff;
        }
        .btn {
            background: #00aaff;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            text-decoration: none;
            border: none;
            cursor: pointer;
        }
        .btn-discord { background: #5865F2; }
        .annunci-section {
            background: rgba(26, 31, 46, 0.7);
            border-radius: 20px;
            padding: 25px;
        }
        .annuncio-item {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 3px solid #00aaff;
        }
        .delete-btn {
            background: #ff5555;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 10px;
            cursor: pointer;
        }
        footer {
            text-align: center;
            padding: 30px;
            margin-top: 30px;
            font-size: 0.8rem;
        }
        @media (max-width: 768px) {
            .header { flex-direction: column; text-align: center; }
            .categories-bar { border-radius: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="user-info">
            <img class="user-avatar" id="userAvatar" src="https://cdn.discordapp.com/embed/avatars/0.png">
            <div><h2 id="userName">Caricamento...</h2><p id="userDiscord">@caricamento</p></div>
        </div>
        <div>
            <span class="saldo" id="userSaldo">💰 0€</span>
            <button class="logout-btn" onclick="logout()">🚪 Logout</button>
        </div>
    </div>

    <div class="categories-bar">
        <button class="category-btn active" onclick="showCategory('annunci', this)">📢 ANNUNCI</button>
        <button class="category-btn" onclick="showCategory('fdo', this)">🚔 FDO</button>
        <button class="category-btn" onclick="showCategory('cri', this)">🚑 CRI</button>
        <button class="category-btn" onclick="showCategory('vdf', this)">🔥 VDF</button>
        <button class="category-btn" onclick="showCategory('anas', this)">🛣️ ANAS</button>
        <button class="category-btn" onclick="showCategory('concessionario', this)">🚗 CONCESSIONARIO</button>
        <button class="category-btn" onclick="showCategory('agenzia', this)">🏠 AGENZIA</button>
    </div>

    <div class="btn-group" style="display: flex; justify-content: flex-end; gap: 15px; margin-bottom: 20px;">
        <a href="https://discord.gg/Gkj7Qdm63Z" target="_blank" class="btn btn-discord">💬 DISCORD</a>
        <a href="https://docs.google.com/document/d/1FcFUAcKs1r8-6EEsJHd_AqbjxqOB2rigGty16BWVFOM/edit?usp=sharing" target="_blank" class="btn">📜 REGOLAMENTO</a>
    </div>

    <div id="mainContent"></div>
    <footer>© 2026 Bologna | RP – Community Roleplay</footer>
</div>

<script>
    const API_URL = "https://bologna-rp-api-84yl.onrender.com";
    let session = JSON.parse(localStorage.getItem('session') || '{}');
    let userRuoli = session.ruoli || ['cittadino'];
    let isAdminWeb = session.is_admin_web || false;
    
    if (!session.discord_id) window.location.href = '/';
    
    document.getElementById('userName').innerText = session.nome_rp;
    document.getElementById('userDiscord').innerHTML = `@${session.discord_nome}`;
    document.getElementById('userSaldo').innerHTML = `💰 ${session.saldo || 0}€`;
    
    function logout() {
        localStorage.clear();
        window.location.href = '/';
    }
    
    async function aggiornaRuoli() {
        try {
            const res = await fetch(`${API_URL}/user-roles?discord_id=${session.discord_id}`);
            const data = await res.json();
            if (data.success && data.ruoli && JSON.stringify(data.ruoli) !== JSON.stringify(userRuoli)) {
                userRuoli = data.ruoli;
                session.ruoli = userRuoli;
                localStorage.setItem('session', JSON.stringify(session));
                location.reload();
            }
        } catch(e) { console.error(e); }
    }
    setInterval(aggiornaRuoli, 30000);
    
    async function loadAnnunci() {
        const res = await fetch(`${API_URL}/annunci`);
        const annunci = await res.json();
        const container = document.getElementById('annunciList');
        if (!annunci.length) { container.innerHTML = '<div style="text-align:center; padding:20px;">Nessun annuncio</div>'; return; }
        let html = '';
        for (let a of annunci) {
            html += `<div class="annuncio-item">
                <div class="annuncio-titolo">${a.titolo}</div>
                <div class="annuncio-contenuto">${a.contenuto}</div>
                <div class="annuncio-footer">
                    <span>📅 ${new Date(a.data).toLocaleString('it-IT')} | 👤 ${a.autore}</span>
                    ${isAdminWeb ? `<button class="delete-btn" onclick="eliminaAnnuncio(${a.id})">🗑️ Elimina</button>` : ''}
                </div>
            </div>`;
        }
        container.innerHTML = html;
    }
    
    async function eliminaAnnuncio(id) {
        if (!confirm('Eliminare?')) return;
        await fetch(`${API_URL}/annunci`, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id, autore_discord_id: session.discord_id })
        });
        loadAnnunci();
    }
    
    function showCategory(cat, btn) {
        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        const main = document.getElementById('mainContent');
        if (cat === 'annunci') {
            main.innerHTML = `<div class="annunci-section"><div class="annunci-header"><h2>📢 ANNUNCI UFFICIALI</h2></div>
                ${isAdminWeb ? `<div class="admin-form"><input id="titolo" placeholder="Titolo"><textarea id="contenuto" placeholder="Contenuto"></textarea><button class="btn" onclick="pubblicaAnnuncio()">📢 PUBBLICA</button></div>` : ''}
                <div id="annunciList">Caricamento...</div></div>`;
            loadAnnunci();
        } else {
            main.innerHTML = `<div style="background:rgba(26,31,46,0.7); border-radius:20px; padding:25px; text-align:center;">
                <h2 style="color:#00aaff;">${cat.toUpperCase()}</h2>
                <p style="margin-top:20px;">🚧 Sezione in costruzione...</p>
                <p>Questa funzionalità sarà disponibile a breve.</p>
            </div>`;
        }
    }
    
    window.pubblicaAnnuncio = async function() {
        const titolo = document.getElementById('titolo')?.value;
        const contenuto = document.getElementById('contenuto')?.value;
        if (!titolo || !contenuto) return alert('Compila tutti i campi');
        await fetch(`${API_URL}/annunci`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ titolo, contenuto, autore: session.nome_rp, autore_discord_id: session.discord_id })
        });
        document.getElementById('titolo').value = '';
        document.getElementById('contenuto').value = '';
        loadAnnunci();
    };
    
    showCategory('annunci');
</script>
</body>
</html>
