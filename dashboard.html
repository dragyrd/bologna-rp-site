<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Bologna | RP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(10, 15, 26, 0.85), rgba(10, 15, 26, 0.9)), url('https://i.ibb.co/wNhKTfzq/LOGO.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #eef2ff;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            background: rgba(26, 31, 46, 0.9);
            border-radius: 30px;
            padding: 20px 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(5px);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 2px solid #00aaff;
        }

        .user-details h2 {
            font-size: 1.3rem;
            margin-bottom: 5px;
        }

        .user-details p {
            font-size: 0.8rem;
            color: #aaa;
        }

        .logout-btn {
            background: #ff5555;
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: #cc4444;
        }

        /* Dashboard grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(26, 31, 46, 0.9);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 25px;
            transition: transform 0.3s;
            border-left: 4px solid #00aaff;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        .card h3 {
            color: #00aaff;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .card p {
            margin: 10px 0;
            line-height: 1.5;
        }

        .badge {
            display: inline-block;
            background: rgba(0,170,255,0.2);
            color: #00aaff;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            margin-top: 10px;
        }

        .badge-success {
            background: rgba(85,255,85,0.2);
            color: #55ff55;
        }

        .badge-warning {
            background: rgba(255,170,0,0.2);
            color: #ffaa00;
        }

        /* Pulsanti */
        .btn {
            background: #00aaff;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-block;
            margin: 5px 5px 0 0;
            font-size: 0.85rem;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #0088cc;
        }

        .btn-discord {
            background: #5865F2;
        }

        .btn-discord:hover {
            background: #4752c4;
        }

        /* Quick links */
        .quick-links {
            background: rgba(26, 31, 46, 0.9);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 30px;
            margin-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .header { flex-direction: column; text-align: center; }
            .user-info { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="dashboardContent">
            <div style="text-align: center; padding: 50px;">
                <div style="font-size: 2rem;">⏳</div>
                <p>Caricamento dashboard...</p>
            </div>
        </div>
        <footer>
            <p>© 2025 Bologna | RP – Community Roleplay Italiana su ER:LC</p>
            <p>🎮 Codice ER:LC: <strong>siUvq</strong></p>
        </footer>
    </div>

    <script>
        // API URL (Render)
        const API_URL = "https://liberty-ita-api-1.onrender.com";
        
        // Logout
        function logout() {
            localStorage.removeItem('discord_token');
            localStorage.removeItem('discord_user');
            window.location.href = '/';
        }
        
        // Carica dashboard
        async function loadDashboard() {
            const token = localStorage.getItem('discord_token');
            const user = JSON.parse(localStorage.getItem('discord_user') || '{}');
            
            // Se non loggato, torna alla home
            if (!token || !user.id) {
                window.location.href = '/';
                return;
            }
            
            // Verifica registrazione nel database del bot
            let registrato = false;
            let userData = null;
            
            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ discord_name: user.username })
                });
                const data = await response.json();
                if (data.success) {
                    registrato = true;
                    userData = data.user;
                }
            } catch (e) {
                console.error("Errore verifica registrazione:", e);
            }
            
            const avatarUrl = user.avatar 
                ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
                : 'https://cdn.discordapp.com/embed/avatars/0.png';
            
            let dashboardHtml = `
                <div class="header">
                    <div class="user-info">
                        <img class="user-avatar" src="${avatarUrl}" alt="Avatar">
                        <div class="user-details">
                            <h2>${user.global_name || user.username}</h2>
                            <p>@${user.username} • ID: ${user.id}</p>
                        </div>
                    </div>
                    <a href="#" onclick="logout()" class="logout-btn">🚪 ESCLUDI</a>
                </div>
                
                <div class="dashboard-grid">
                    <div class="card">
                        <h3>👤 STATUS ACCOUNT</h3>
                        ${registrato ? 
                            `<p>✅ <strong>Registrato nel database</strong></p>
                             <p>📛 Nome RP: <strong>${userData?.nome_rp || 'Non impostato'}</strong></p>
                             <p>🎮 Roblox: <strong>${userData?.roblox || 'Non impostato'}</strong></p>
                             <div class="badge badge-success">🟣 Cittadino</div>` :
                            `<p>⚠️ <strong>Non sei ancora registrato!</strong></p>
                             <p>Usa il comando <code>/cittadinanza</code> su Discord per registrarti nel server.</p>
                             <div class="badge badge-warning">🟣 Turista</div>`
                        }
                    </div>
                    
                    <div class="card">
                        <h3>📊 STATISTICHE PERSONALI</h3>
                        <p>📅 Ultimo accesso: <strong>${new Date().toLocaleDateString('it-IT')}</strong></p>
                        <p>⭐ Reputazione: <strong>0</strong></p>
                        <p>🎫 Ticket aperti: <strong>0</strong></p>
                        <p>💰 Saldo: <strong>Caricamento...</strong></p>
                    </div>
                    
                    <div class="card">
                        <h3>⚡ AZIONI RAPIDE</h3>
                        <p><a href="https://discord.gg/Gkj7Qdm63Z" target="_blank" class="btn btn-discord">💬 Apri Discord</a></p>
                        <p><a href="#" class="btn" onclick="window.location.href='/'">🏠 Torna alla Home</a></p>
                        ${registrato ? `<p><a href="#" class="btn" onclick="alert('Funzionalità in sviluppo!')">📝 Gestisci Profilo</a></p>` : ''}
                    </div>
                </div>
                
                <div class="quick-links">
                    <h3 style="color: #00aaff; margin-bottom: 15px;">🔗 LINK UTILI</h3>
                    <a href="https://discord.gg/Gkj7Qdm63Z" target="_blank" class="btn btn-discord">📜 Regolamento</a>
                    <a href="https://discord.gg/Gkj7Qdm63Z" target="_blank" class="btn btn-discord">🎫 Supporto Ticket</a>
                    <a href="#" class="btn" onclick="alert('Shop in arrivo!')">🛒 Negozio</a>
                </div>
            `;
            
            document.getElementById('dashboardContent').innerHTML = dashboardHtml;
        }
        
        loadDashboard();
    </script>

</body>
</html>
