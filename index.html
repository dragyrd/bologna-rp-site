<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bologna RP - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            color: #fff;
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #aaa;
            margin-bottom: 40px;
        }

        .discord-btn {
            background: #5865F2;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .discord-btn:hover {
            background: #4752c4;
            transform: scale(1.05);
        }

        .error {
            color: #ff6b6b;
            margin-top: 20px;
            padding: 10px;
            background: rgba(255, 0, 0, 0.1);
            border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>⚜️ BOLOGNA | RP ⚜️</h1>
        <p class="subtitle">Accedi per visualizzare dashboard e ticket</p>
        <button class="discord-btn" onclick="loginWithDiscord()">
            💬 ACCEDI CON DISCORD
        </button>
        <div id="error" class="error"></div>
    </div>

    <script>
        const CLIENT_ID = '1473999356125249556';
        const REDIRECT_URI = encodeURIComponent('https://bologna-rp-site.vercel.app/dashboard.html');
        const SCOPE = 'identify guilds';

        function loginWithDiscord() {
            const discordAuthUrl = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=${SCOPE}`;
            window.location.href = discordAuthUrl;
        }

        // Controllo errori
        window.onload = function() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const error = params.get('error');
            
            if (error) {
                const errorDiv = document.getElementById('error');
                errorDiv.textContent = 'Errore di autenticazione: ' + error;
                errorDiv.style.display = 'block';
            }
        };
    </script>
</body>
</html>
