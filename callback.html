<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Accesso in corso...</title>
    <style>
        body {
            background: #0a0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: monospace;
            color: white;
        }
        .loader { text-align: center; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0,170,255,0.2);
            border-top: 3px solid #00aaff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <h3>🎫 Accesso in corso...</h3>
        <p>Recupero informazioni dal server...</p>
    </div>

    <script>
        const CLIENT_ID = "1489266190432997520";
        const SERVER_ID = "1465791443493851310";
        
        // Mappa ID ruoli -> nomi leggibili
        const ROLE_MAP = {
            '1473322686301344006': 'fdo',
            '1473323314138190038': 'cri',
            '1489181994855432282': 'vdf',
            '1473322697189490943': 'anas',
            '1473323081102524500': 'concessionario',
            '1473323100476014723': 'agenzia',
            '1473318063377219717': 'staff'
        };
        
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const token = params.get('access_token');
        
        if (token) {
            localStorage.setItem('discord_token', token);
            
            // 1. Ottieni informazioni utente
            fetch('https://discord.com/api/users/@me', {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => res.json())
            .then(user => {
                localStorage.setItem('discord_user_id', user.id);
                localStorage.setItem('discord_user_name', user.username);
                localStorage.setItem('discord_user_avatar', user.avatar);
                
                // 2. Ottieni i server dell'utente
                return fetch('https://discord.com/api/users/@me/guilds', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
            })
            .then(res => res.json())
            .then(guilds => {
                const server = guilds.find(g => g.id === SERVER_ID);
                if (!server) {
                    throw new Error('Non sei nel server Bologna | RP');
                }
                
                // 3. Ottieni i ruoli dell'utente nel server
                return fetch(`https://discord.com/api/guilds/${SERVER_ID}/members/${localStorage.getItem('discord_user_id')}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
            })
            .then(res => res.json())
            .then(member => {
                if (member && member.roles) {
                    const ruoli = member.roles
                        .filter(roleId => ROLE_MAP[roleId])
                        .map(roleId => ROLE_MAP[roleId]);
                    
                    localStorage.setItem('discord_roles', JSON.stringify(ruoli));
                }
                
                // Reindirizza alla dashboard
                window.location.href = '/dashboard.html';
            })
            .catch(err => {
                console.error(err);
                alert('Errore: ' + err.message);
                window.location.href = '/';
            });
        } else {
            window.location.href = '/';
        }
    </script>
</body>
</html>
